mixed-port: 7893
allow-lan: true
mode: rule
log-level: debug
ipv6: false
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 114.114.114.114
  nameserver:
    - 223.5.5.5
    - 114.114.114.114
    - 119.29.29.29
    - 180.76.76.76
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.example"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.local"
    - "*.home.arpa"
    - router.asus.com
    - localhost.sec.qq.com
    - localhost.ptlogin2.qq.com
    - "+.msftconnecttest.com"
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - 114.114.114.114:53
    - 180.76.76.76:53
    - 119.29.29.29:53
    - 223.5.5.5:53
    - 8.8.8.8:53
    - 8.8.4.4:53
    - 1.1.1.1:53
    - 1.0.0.1:53

proxy-providers:
  UnjlAms:
    type: http
    url: ""
    path: ./proxy/UnjlAms.yaml
    interval: 7200
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

  mojie:
    type: http
    url: ""
    path: ./proxy/mojie.yaml
    interval: 7200
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204


proxy-groups:
  - name: PROXY
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use:
      - UnjlAms

  # 🇯🇵 Japan: 自动筛选日本地区的节点
  - name: 🇯🇵 Japan
    type: select
    use:
      - mojie
    filter: "(?i)日|JP|Japan"

  # 🇺🇸 United States: 自动筛选美国地区的节点
  - name: 🇺🇸 United States
    type: select
    use:
      - mojie
    filter: "(?i)美|US|United States"

  # 🇸🇬 Singapore: 自动筛选新加坡地区的节点
  - name: 🇸🇬 Singapore
    type: select
    use:
      - mojie
    filter: "(?i)新|SG|Singapore"

  # 🇹🇼 Taiwan: 自动筛选台湾地区的节点
  - name: 🇹🇼 Taiwan
    type: select
    use:
      - mojie
    filter: "(?i)台|TW|Taiwan"

  - name: US
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - 🇺🇸 United States

  - name: 港澳台 BiliBili
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - DIRECT
      -  🇹🇼 Taiwan
    use:
      - UnjlAms
    #   -  🇹🇼 Taiwan

  - name: others
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use:
      - UnjlAms
    proxies:
      - 🇺🇸 United States
      - 🇯🇵 Japan
      - 🇹🇼 Taiwan
      - 🇸🇬 Singapore
      


