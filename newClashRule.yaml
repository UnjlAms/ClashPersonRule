mixed-port: 7893
allow-lan: true
mode: rule
log-level: debug
ipv6: false
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 114.114.114.114
  nameserver:
    - 223.5.5.5
    - 114.114.114.114
    - 119.29.29.29
    - 180.76.76.76
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.example"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.local"
    - "*.home.arpa"
    - router.asus.com
    - localhost.sec.qq.com
    - localhost.ptlogin2.qq.com
    - "+.msftconnecttest.com"
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - 114.114.114.114:53
    - 180.76.76.76:53
    - 119.29.29.29:53
    - 223.5.5.5:53
    - 8.8.8.8:53
    - 8.8.4.4:53
    - 1.1.1.1:53
    - 1.0.0.1:53

proxy-providers:
  UnjlAms:
    type: http
    url: ""
    path: ./proxy/UnjlAms.yaml
    interval: 7200

  America:
    type: http
    url: ""
    path: ./proxy/mojie.yaml
    interval: 7200
    filter: "美国"

  Japan:
    type: http
    url: ""
    path: ./proxy/mojie.yaml
    interval: 7200
    filter: "日本"

  TaiWan:
    type: http
    url: ""
    path: ./proxy/mojie.yaml
    interval: 7200
    filter: "台湾"

  Singapore:
    type: http
    url: ""
    path: ./proxy/mojie.yaml
    interval: 7200
    filter: "新加坡"


proxy-groups:
  - name: PROXY
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use:
      - UnjlAms
  - name: US
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use:
      - America
  - name: 港澳台 BiliBili
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - DIRECT
    use:
      - UnjlAms
      - TaiWan
  - name: 其他
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use:
      - UnjlAms
      - America
      - Japan
      - TaiWan
      - Singapore


